# /etc/nginx/sites-available/ipam.conf
# Algorhythm IPAM reverse proxy
# Symlink: ln -s /etc/nginx/sites-available/ipam.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name ipam.yourdomain.com;   # <-- change this or use server_name _;

    # Optional: redirect HTTP → HTTPS (uncomment if you have SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 20M;
    }
}

